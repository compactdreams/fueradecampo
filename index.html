<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Fuera de Campo</title>
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
    </head>
    <body>
        <main class="main-menu">
            <div class="main-menu-logo">
            <img src="images/logos/logoFueraFoco.png" alt="logo Fuera de Foco">
            </div>
        </main>
        <article>
            <div class="director">
                <img class="director-images" src="images/directores/square_images_ai/david_lynch.jpeg" alt="picture of David Lynch">
                <p class="director-name">David Lynch</p>
            </div>
            <div class="director">
                <img class="director-images" src="images/directores/square_images_ai/luis_bunuel.jpeg" alt="picture of Luis Bunuel">
                <p class="director-name">Luis Buñuel</p>
            </div>
            <div class="director">
                <img class="director-images" src="images/directores/square_images_ai/peter_strickland.jpeg" alt="picture of Peter Strickland">
                <p class="director-name">Peter Strickland</p>
            </div>
            <div class="director">
                <img class="director-images" src="images/directores/square_images_ai/sergei_parajanov.jpeg" alt="picture of Sergei Parajanov">
                <p class="director-name">Sergei Parajanovf</p>
            </div>
            <div class="director">
                <img class="director-images" src="images/directores/square_images_ai/stanley_kubrick.jpeg" alt="picture of Stanley Kubrick">

            </div>
                        <div class="director">
                <img class="director-images" src="images/directores/square_images_ai/Isabella Eklöf.png" alt="picture of Isabella Eklöf">
                <p class="director-name">Isabella Eklöf</p>
            </div>
            <div class="director">
                <img class="director-images" src="images/directores/square_images_ai/Jane Campion.png" alt="picture of Jane Campion">
                <p class="director-name">Jane Campion</p>
            </div>
                        <div class="director">
                <img class="director-images" src="images/directores/square_images_ai/Fina Torres.png" alt="picture of Fina Torres">
                <p class="director-name">Fina Torres</p>
            </div>
        </article>
        <p id="screen-width"></p>

<script>
document.getElementById("screen-width").textContent =
"Viewport: " + window.innerWidth + "px";
</script>
    </body>
</html>
